<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#080c10;font-family:'Barlow Condensed',sans-serif;color:#e8f0fe;overflow-x:hidden}
::-webkit-scrollbar{display:none}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative}
.card{background:#0e1520;border:1px solid #1a2535;border-radius:12px;padding:16px}
.lbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#445}
.big{font-family:'Barlow Condensed';font-weight:800;font-size:34px;line-height:1}
.inp{background:#0e1520;border:1px solid #2a3545;border-radius:8px;color:#e8f0fe;padding:10px 12px;width:100%;font-family:'Barlow';font-size:14px;outline:none}
.inp:focus{border-color:#00ff9d66}
.btn-g{background:#00ff9d;color:#080c10;border:none;border-radius:8px;padding:11px 0;width:100%;font-family:'Barlow Condensed';font-weight:800;font-size:16px;letter-spacing:1px;cursor:pointer}
.btn-ghost{background:transparent;border:1px solid #2a3545;border-radius:8px;padding:9px 0;width:100%;font-family:'Barlow Condensed';font-weight:700;font-size:14px;color:#889;cursor:pointer;letter-spacing:1px}
.btn-export{background:transparent;border:1px solid #00ff9d;border-radius:8px;padding:7px 12px;font-family:'Barlow Condensed';font-weight:700;font-size:13px;color:#00ff9d;cursor:pointer;letter-spacing:1px;display:flex;align-items:center;gap:5px;transition:background .15s}
.btn-export:hover{background:#00ff9d18}
.btn-export:disabled{opacity:.35;cursor:not-allowed;border-color:#445;color:#445}
.chip{background:#0e1520;border:1px solid #1a2535;border-radius:20px;padding:5px 12px;cursor:pointer;font-family:'Barlow Condensed';font-weight:700;font-size:13px;letter-spacing:1px;color:#889;transition:all .15s}
.chip.a{border-color:#00ff9d;color:#00ff9d;background:#00ff9d11}
.chip.b{border-color:#7eb8f7;color:#7eb8f7;background:#7eb8f711}
.yr-tab{background:transparent;border:none;padding:7px 14px;cursor:pointer;font-family:'Barlow Condensed';font-weight:700;font-size:15px;letter-spacing:1px;border-bottom:2px solid transparent;transition:all .15s;color:#445}
.yr-tab.active{color:#00ff9d;border-bottom-color:#00ff9d}
.yr-tab:hover{color:#aaa}
.del-btn{background:transparent;border:none;color:#ff4d6d;cursor:pointer;font-size:16px;padding:4px 8px;font-weight:700}
.edit-btn{background:transparent;border:none;color:#7eb8f7;cursor:pointer;font-family:'Barlow Condensed';font-weight:700;font-size:12px;letter-spacing:1px;padding:4px 8px}
.hcell{width:11px;height:11px;border-radius:2px;flex-shrink:0;cursor:pointer;display:inline-block}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:up .3s ease forwards}
.modal-bg{position:fixed;inset:0;background:#00000088;z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#0e1520;border:1px solid #2a3545;border-radius:16px;padding:24px;width:100%;max-width:320px}
.hidden{display:none!important}

/* HEADER */
#header{padding:14px 16px 0;border-bottom:1px solid #1a2535;background:#080c10;position:sticky;top:0;z-index:50}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}

<!-- SheetJS via jsDelivr -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script>
/* ─── CONSTANTS ─── */
const MONTHS_ID = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
const MONTHS_SHORT = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];
const DAYS_ID = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
const CY = new Date().getFullYear();

/* ─── HELPERS ─── */
const fmtPace = p => { if(!p)return"—"; const m=Math.floor(p),s=Math.round((p-m)*60); return `${m}:${s.toString().padStart(2,"0")}`; };
const fmtDate = iso => { const [y,mo,d]=iso.split("-"); return `${d}/${mo}/${y}`; };
const pct = (a,b) => b?(((a-b)/b)*100).toFixed(1):null;
const LS_KEY = y => `rundata_${y}`;
const el = id => document.getElementById(id);
const show = id => el(id)&&el(id).classList.remove("hidden");
const hide = id => el(id)&&el(id).classList.add("hidden");
const toggle = (id, cond) => cond ? show(id) : hide(id);

/* ─── STORAGE ─── */
const loadYear = y => { try{const d=localStorage.getItem(LS_KEY(y));return d?JSON.parse(d):[]}catch{return[]} };
const saveYear = (y,d) => { try{localStorage.setItem(LS_KEY(y),JSON.stringify(d))}catch{} };
const loadYearList = () => { try{const r=localStorage.getItem("run_years");return r?JSON.parse(r):[CY]}catch{return[CY]} };
const saveYearList = l => { try{localStorage.setItem("run_years",JSON.stringify(l))}catch{} };

/* ─── STATE ─── */
let yearList = loadYearList();
let year = CY;
let allData = {};
yearList.forEach(y => { allData[y] = loadYear(y); });
let tab = "dashboard";
let showForm = false;
let editId = null;
let formData = {date:"",distance:"",pace:""};
let cmpA = 0, cmpB = 1;
let deleteConfirm = null;
let targetDist = null;
let intervalMode = false;

/* ─── DERIVED ─── */
const getSessions = () => (allData[year]||[]).slice().sort((a,b)=>new Date(a.date)-new Date(b.date));
const getMonthly = (sessions) => MONTHS_SHORT.map((name,idx)=>{
  const ms = sessions.filter(s=>s.month===idx);
  const dist = +ms.reduce((a,b)=>a+b.distance,0).toFixed(1);
  const pace = ms.length ? +(ms.reduce((a,b)=>a+b.pace,0)/ms.length).toFixed(2) : 0;
  return {name, month:idx, dist, pace, count:ms.length};
});

/* ─── EXPORT EXCEL ─── */
function exportExcel() {
  if(typeof XLSX === 'undefined') { alert('Library Excel belum loaded, coba lagi.'); return; }
  const sessions = getSessions();
  const wb = XLSX.utils.book_new();
  const sorted = sessions;
  const monthly = MONTHS_ID.map((name,idx)=>{
    const ms=sorted.filter(s=>new Date(s.date).getMonth()===idx);
    const dist=+ms.reduce((a,b)=>a+b.distance,0).toFixed(1);
    const pace=ms.length?+(ms.reduce((a,b)=>a+b.pace,0)/ms.length).toFixed(2):0;
    const maxD=ms.length?+Math.max(...ms.map(s=>s.distance)).toFixed(1):0;
    return{name,dist,count:ms.length,pace,maxD};
  });

  // Sheet 1
  const logHeaders=["No","Tanggal","Hari","Bulan","Jarak (km)","Pace","Durasi (menit)"];
  const logRows=sorted.map((s,i)=>{const d=new Date(s.date);return[i+1,fmtDate(s.date),DAYS_ID[d.getDay()],MONTHS_ID[d.getMonth()],+s.distance.toFixed(1),`${fmtPace(s.pace)} /km`,s.duration];});
  const ws1=XLSX.utils.aoa_to_sheet([logHeaders,...logRows]);
  ws1["!cols"]=[{wch:5},{wch:12},{wch:10},{wch:12},{wch:12},{wch:14},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws1,"Log Sesi");

  // Sheet 2
  const mHeaders=["Bulan","Total Jarak (km)","Jumlah Sesi","Avg Pace","Jarak Terpanjang (km)","Tren vs Bulan Lalu"];
  const mRows=monthly.map((m,i)=>{const prev=monthly[i-1];let tren="—";if(prev&&prev.dist>0&&m.dist>0){const d=pct(m.dist,prev.dist);tren=parseFloat(d)>=0?`↑ +${d}%`:`↓ ${d}%`;}return[m.name,m.dist||"",m.count||"",m.pace?`${fmtPace(m.pace)} /km`:"—",m.maxD||"",tren];});
  const ws2=XLSX.utils.aoa_to_sheet([mHeaders,...mRows]);
  ws2["!cols"]=[{wch:14},{wch:18},{wch:14},{wch:14},{wch:22},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws2,"Ringkasan Bulanan");

  // Sheet 3
  const total=+sorted.reduce((a,b)=>a+b.distance,0).toFixed(1);
  const avgP=sorted.length?+(sorted.reduce((a,b)=>a+b.pace,0)/sorted.length).toFixed(2):0;
  const fastest=sorted.length?sorted.reduce((a,b)=>b.pace<a.pace?b:a):null;
  const longest=sorted.length?sorted.reduce((a,b)=>b.distance>a.distance?b:a):null;
  const bestMo=monthly.reduce((a,b)=>b.dist>a.dist?b:a,monthly[0]);
  const mostActive=monthly.reduce((a,b)=>b.count>a.count?b:a,monthly[0]);
  const weeksWithRun=new Set(sorted.map(s=>{const diff=(new Date(s.date)-new Date(`${year}-01-01`))/(7*86400000);return Math.floor(diff);})).size;
  const consistency=`${Math.round((weeksWithRun/52)*100)}%`;
  const statRows=[["Tahun",year],["Total Jarak (km)",total||"—"],["Total Sesi",sorted.length||"—"],["Rata-rata Pace",avgP?`${fmtPace(avgP)} /km`:"—"],["Pace Terbaik",fastest?`${fmtPace(fastest.pace)} /km`:"—"],["Jarak Terpanjang",longest?`${longest.distance} km`:"—"],["Bulan Terbaik",bestMo.dist>0?`${bestMo.name} — ${bestMo.dist} km`:"—"],["Bulan Teraktif",mostActive.count>0?`${mostActive.name} — ${mostActive.count} sesi`:"—"],["Konsistensi",sorted.length?consistency:"—"]];
  const ws3=XLSX.utils.aoa_to_sheet(statRows);
  ws3["!cols"]=[{wch:30},{wch:24}];
  XLSX.utils.book_append_sheet(wb,ws3,"Statistik Tahunan");

  const today=new Date();
  XLSX.writeFile(wb,`Lari_${year}_${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}.xlsx`);
}

/* ─── SVG CHARTS ─── */
function svgAreaChart(container, data, xKey, yKey, color) {
  const W = container.clientWidth || 320;
  const H = 150, pad = {top:8,right:8,left:28,bottom:20};
  const iW = W-pad.left-pad.right, iH = H-pad.top-pad.bottom;
  if(!data.length){container.innerHTML='';return;}
  const xs = data.map((_,i)=>i);
  const ys = data.map(d=>d[yKey]);
  const minY=Math.min(...ys), maxY=Math.max(...ys);
  const xScale = i => pad.left + (i/(data.length-1||1))*iW;
  const yScale = v => pad.top + iH - ((v-minY)/(maxY-minY||1))*iH;

  // grid lines
  let gridLines='', gridLabels='';
  const steps=4;
  for(let i=0;i<=steps;i++){
    const v=minY+(maxY-minY)*(i/steps);
    const y=yScale(v);
    gridLines+=`<line x1="${pad.left}" y1="${y}" x2="${W-pad.right}" y2="${y}" stroke="#1a2535" stroke-dasharray="3,3"/>`;
    gridLabels+=`<text x="${pad.left-4}" y="${y+3}" text-anchor="end" fill="#445" font-size="9">${v.toFixed(0)}</text>`;
  }

  // x labels (max 6)
  let xLabels='';
  const xStep=Math.max(1,Math.floor(data.length/5));
  data.forEach((d,i)=>{if(i%xStep===0){xLabels+=`<text x="${xScale(i)}" y="${H-4}" text-anchor="middle" fill="#445" font-size="9">${d[xKey]}</text>`;}});

  // path
  let pathD='', areaD='';
  data.forEach((d,i)=>{
    const x=xScale(i), y=yScale(d[yKey]);
    pathD+=(i===0?`M${x},${y}`:`L${x},${y}`);
    areaD+=(i===0?`M${x},${pad.top+iH} L${x},${y}`:`L${x},${y}`);
  });
  areaD+=`L${xScale(data.length-1)},${pad.top+iH}Z`;

  container.innerHTML=`<div class="chart-wrap"><svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}">
    <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.3"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    ${gridLines}${gridLabels}${xLabels}
    <path d="${areaD}" fill="url(#ag)"/>
    <path d="${pathD}" stroke="${color}" stroke-width="2" fill="none"/>
  </svg></div>`;
}

function svgBarChart(container, data, xKey, yKey, color) {
  const W = container.clientWidth || 320;
  const H = 120, pad = {top:8,right:4,left:28,bottom:20};
  const iW = W-pad.left-pad.right, iH = H-pad.top-pad.bottom;
  if(!data.length){container.innerHTML='';return;}
  const ys = data.map(d=>d[yKey]);
  const maxY = Math.max(...ys,1);
  const barW = Math.max(3,Math.floor(iW/data.length)-2);
  const xScale = i => pad.left + (i/data.length)*iW + (iW/data.length - barW)/2;
  const yScale = v => (v/maxY)*iH;

  let bars='', labels='';
  const step=Math.max(1,Math.floor(data.length/8));
  data.forEach((d,i)=>{
    const bH=yScale(d[yKey]);
    bars+=`<rect x="${xScale(i)}" y="${pad.top+iH-bH}" width="${barW}" height="${bH}" fill="${color}" rx="2"/>`;
    if(i%step===0) labels+=`<text x="${xScale(i)+barW/2}" y="${H-4}" text-anchor="middle" fill="#445" font-size="9">${d[xKey]}</text>`;
  });

  // y axis labels
  let yLabels='';
  for(let i=0;i<=3;i++){
    const v=(maxY*i/3);
    const y=pad.top+iH-(yScale(v));
    yLabels+=`<text x="${pad.left-4}" y="${y+3}" text-anchor="end" fill="#445" font-size="9">${v.toFixed(0)}</text>`;
  }

  container.innerHTML=`<div class="chart-wrap"><svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}">
    <line x1="${pad.left}" y1="${pad.top}" x2="${pad.left}" y2="${pad.top+iH}" stroke="#1a2535"/>
    ${yLabels}${bars}${labels}
  </svg></div>`;
}

function svgLineChart(container, data, xKey, yKey, color) {
  const W = container.clientWidth || 320;
  const H = 150, pad = {top:8,right:8,left:36,bottom:20};
  const iW = W-pad.left-pad.right, iH = H-pad.top-pad.bottom;
  if(data.length<2){container.innerHTML='';return;}
  const ys = data.map(d=>d[yKey]);
  const minY=Math.min(...ys)*0.98, maxY=Math.max(...ys)*1.02;
  const xScale = i => pad.left + (i/(data.length-1))*iW;
  const yScale = v => pad.top + iH - ((v-minY)/(maxY-minY||1))*iH;

  let gridLines='', yLabels='';
  for(let i=0;i<=3;i++){
    const v=minY+(maxY-minY)*(i/3);
    const y=yScale(v);
    gridLines+=`<line x1="${pad.left}" y1="${y}" x2="${W-pad.right}" y2="${y}" stroke="#1a2535" stroke-dasharray="3,3"/>`;
    yLabels+=`<text x="${pad.left-4}" y="${y+3}" text-anchor="end" fill="#445" font-size="9">${fmtPace(v)}</text>`;
  }

  let pathD='', dots='', xLabels='';
  data.forEach((d,i)=>{
    const x=xScale(i),y=yScale(d[yKey]);
    pathD+=(i===0?`M${x},${y}`:`L${x},${y}`);
    dots+=`<circle cx="${x}" cy="${y}" r="3" fill="${color}"/>`;
    xLabels+=`<text x="${x}" y="${H-4}" text-anchor="middle" fill="#445" font-size="9">${d[xKey]}</text>`;
  });

  container.innerHTML=`<div class="chart-wrap"><svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}">
    ${gridLines}${yLabels}
    <path d="${pathD}" stroke="${color}" stroke-width="2" fill="none"/>
    ${dots}${xLabels}
  </svg></div>`;
}

function svgHeatmap(container, sessions) {
  const map={};
  sessions.forEach(s=>{map[s.date]=(map[s.date]||0)+s.distance;});

  const cells=[];
  for(let mo=0;mo<12;mo++){
    const days=new Date(year,mo+1,0).getDate();
    for(let d=1;d<=days;d++){
      const dt=`${year}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      cells.push({date:dt,dist:map[dt]||0,dow:new Date(dt).getDay()});
    }
  }

  const weeks=[];let wk=[];
  cells.forEach((c,i)=>{
    if(i===0){for(let j=0;j<c.dow;j++)wk.push(null);}
    wk.push(c);
    if(c.dow===6){weeks.push(wk);wk=[];}
  });
  if(wk.length)weeks.push(wk);

  const colorOf = d=>!d?"#1a2535":d<5?"rgba(0,255,157,0.16)":d<10?"rgba(0,255,157,0.4)":d<15?"rgba(0,255,157,0.67)":"#00ff9d";
  const cw=13,ch=13,gap=2;
  const W=weeks.length*(cw+gap)+4, H=7*(ch+gap)+24;

  let rects='';
  weeks.forEach((wk,wi)=>{
    Array.from({length:7}).forEach((_,di)=>{
      const c=wk[di];
      if(c){
        rects+=`<rect x="${wi*(cw+gap)+2}" y="${di*(ch+gap)}" width="${cw}" height="${ch}" rx="2" fill="${colorOf(c.dist)}"><title>${c.date}${c.dist?" — "+c.dist+"km":""}</title></rect>`;
      }
    });
  });

  const legend=[0.16,0.4,0.67,1].map((o,i)=>
    `<rect x="${i*(12+3)+80}" y="${H-12}" width="11" height="11" rx="2" fill="rgba(0,255,157,${o})"/>`
  ).join('');

  container.innerHTML=`<div class="lbl" style="margin-bottom:10px">Kalender ${year}</div>
  <div style="overflow-x:auto"><svg width="${Math.max(W,300)}" height="${H}" style="min-width:${W}px">
    ${rects}
    <text x="0" y="${H-4}" fill="#445" font-size="10">Tidak lari</text>
    ${legend}
    <text x="${4*(12+3)+84}" y="${H-4}" fill="#445" font-size="10">15km+</text>
  </svg></div>`;
}

function svgBarChartCmp(container, mA, mB, nameA, nameB) {
  const W = container.clientWidth || 320;
  const H = 170, pad = {top:8,right:8,left:70,bottom:20};
  const iW = W-pad.left-pad.right, iH = H-pad.top-pad.bottom;
  const rows = [
    {label:"Jarak (km)", a:mA.dist, b:mB.dist},
    {label:"Sesi", a:mA.count, b:mB.count},
    {label:"Pace ×10", a:+(mA.pace*10).toFixed(1), b:+(mB.pace*10).toFixed(1)},
  ];
  const maxVal = Math.max(...rows.map(r=>Math.max(r.a,r.b)),1);
  const rowH = iH/rows.length;
  const barH = 12;

  let bars='', labels='', yLabels='';
  rows.forEach((r,i)=>{
    const y0 = pad.top + i*rowH + rowH/2;
    const wa = (r.a/maxVal)*iW;
    const wb = (r.b/maxVal)*iW;
    bars+=`<rect x="${pad.left}" y="${y0-barH-1}" width="${wa}" height="${barH}" fill="#00ff9d" rx="3"/>`;
    bars+=`<rect x="${pad.left}" y="${y0+1}" width="${wb}" height="${barH}" fill="#7eb8f7" rx="3"/>`;
    yLabels+=`<text x="${pad.left-6}" y="${y0+3}" text-anchor="end" fill="#889" font-size="11" font-weight="700">${r.label}</text>`;
  });

  // legend
  const legY = H-4;
  const legX = W/2 - 60;

  container.innerHTML=`<div class="lbl" style="margin-bottom:10px">Perbandingan Langsung</div>
  <div class="chart-wrap"><svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}">
    ${yLabels}${bars}
    <rect x="${legX}" y="${legY-9}" width="10" height="10" fill="#00ff9d" rx="2"/>
    <text x="${legX+13}" y="${legY}" fill="#889" font-size="10">${nameA}</text>
    <rect x="${legX+55}" y="${legY-9}" width="10" height="10" fill="#7eb8f7" rx="2"/>
    <text x="${legX+68}" y="${legY}" fill="#889" font-size="10">${nameB}</text>
  </svg></div>`;
}

/* ─── RENDER ─── */
function render() {
  const sessions = getSessions();
  const monthly = getMonthly(sessions);

  // header
  el("header-year").textContent = year;
  el("btn-export").disabled = !sessions.length;

  // year tabs
  const tabsEl = el("year-tabs");
  tabsEl.innerHTML = yearList.map(y2=>
    `<button class="yr-tab${year===y2?" active":""}" onclick="switchYear(${y2})">${y2}</button>`
  ).join('') + `<button onclick="el('modal-year').classList.remove('hidden')" style="background:transparent;border:none;color:#445;cursor:pointer;padding:7px 12px;font-family:'Barlow Condensed';font-weight:700;font-size:18px;line-height:1;flex-shrink:0">＋</button>`;

  // form
  toggle("form-section", showForm);
  if(showForm) el("form-title").textContent = editId ? "EDIT SESI" : `TAMBAH SESI — ${year}`;

  // tabs visibility
  ["dashboard","bulanan","harian","perbandingan","target","log"].forEach(t=>{
    const pane = el(`tab-${t}`);
    if(t===tab){ pane.classList.remove("hidden"); pane.classList.add("fade"); }
    else { pane.classList.add("hidden"); }
    // nav color
    const nl = el(`nl-${t}`);
    if(nl) nl.style.color = t===tab ? "#00ff9d" : "#445";
    const nd = el(`nd-${t}`);
    if(nd) nd.style.display = t===tab ? "block" : "none";
  });

  // ── DASHBOARD ──
  if(tab==="dashboard"){
    const hasData = sessions.length>0;
    toggle("empty-dashboard", !hasData);
    if(!hasData) el("empty-year-d").textContent = `Belum ada sesi di ${year}`;

    const yearly = hasData ? {
      total: +sessions.reduce((a,b)=>a+b.distance,0).toFixed(1),
      avgPace: +(sessions.reduce((a,b)=>a+b.pace,0)/sessions.length).toFixed(2),
      count: sessions.length,
      best: sessions.reduce((a,b)=>b.distance>a.distance?b:a)
    } : null;

    const statsEl = el("stats-cards");
    if(yearly){
      statsEl.classList.remove("hidden");
      statsEl.innerHTML = [
        {label:"Total Jarak",val:yearly.total,unit:" km",color:"#00ff9d"},
        {label:"Total Sesi",val:yearly.count,unit:"x",color:"#7eb8f7"},
        {label:"Avg Pace",val:fmtPace(yearly.avgPace),unit:" /km",color:"#ffb347",sm:true},
        {label:"Terpanjang",val:yearly.best.distance,unit:" km",color:"#ff6b9d"},
      ].map(c=>`<div class="card"><div class="lbl">${c.label}</div>
        <div class="big" style="color:${c.color};font-size:${c.sm?26:34}px">${c.val}<span style="font-size:14px;color:#556">${c.unit}</span></div>
      </div>`).join('');
    } else {
      statsEl.classList.add("hidden");
    }

    // cumulative chart
    let cum=0;
    const cumData = sessions.map(s=>{cum+=s.distance;return{date:s.date.slice(5),cum:+cum.toFixed(1)};});
    const cumEl = el("chart-cumulative");
    if(cumData.length>1){
      cumEl.classList.remove("hidden");
      cumEl.innerHTML = `<div class="lbl" style="margin-bottom:10px">Akumulasi Jarak ${year}</div>`;
      const chartDiv = document.createElement("div");
      cumEl.appendChild(chartDiv);
      setTimeout(()=>svgAreaChart(chartDiv, cumData, "date", "cum", "#00ff9d"),0);
    } else { cumEl.classList.add("hidden"); }

    // weekly chart
    const wmap={};
    sessions.forEach(s=>{
      const w=Math.floor((new Date(s.date)-new Date(`${year}-01-01`))/6048e5);
      const k=`W${w+1}`; wmap[k]=(wmap[k]||0)+s.distance;
    });
    const weeklyData = Object.entries(wmap).map(([k,v])=>({k,dist:+v.toFixed(1)}));
    const wkEl = el("chart-weekly");
    if(weeklyData.length>1){
      wkEl.classList.remove("hidden");
      wkEl.innerHTML = `<div class="lbl" style="margin-bottom:10px">Jarak per Minggu</div>`;
      const chartDiv = document.createElement("div");
      wkEl.appendChild(chartDiv);
      setTimeout(()=>svgBarChart(chartDiv, weeklyData, "k", "dist", "#7eb8f7"),0);
    } else { wkEl.classList.add("hidden"); }

    // heatmap
    setTimeout(()=>svgHeatmap(el("chart-heatmap"), sessions), 0);
  }

  // ── BULANAN ──
  if(tab==="bulanan"){
    toggle("empty-bulanan", !sessions.length);
    if(!sessions.length) el("empty-bulanan").innerHTML=`<div style="font-size:40px;margin-bottom:10px">🏃</div><div style="font-family:'Barlow Condensed';font-weight:800;font-size:20px">Belum ada sesi di ${year}</div>`;

    const trendLabel=(curr,prev)=>{
      const d=pct(curr,prev);
      if(d===null||!prev)return{text:"—",color:"#556"};
      const n=parseFloat(d);
      if(n>10)return{text:`↑↑ +${d}%`,color:"#00ff9d"};
      if(n>0)return{text:`↑ +${d}%`,color:"#7cfc00"};
      if(n<-10)return{text:`↓↓ ${d}%`,color:"#ff4d6d"};
      return{text:`↓ ${d}%`,color:"#ff9f45"};
    };

    el("monthly-cards").innerHTML = monthly.map((m,i)=>{
      const prev=monthly[i-1];
      const tr=trendLabel(m.dist,prev?.dist);
      const ms=sessions.filter(s=>s.month===i);
      const maxD=Math.max(...ms.map(s=>s.distance),1);
      const bars=ms.length?`<div style="display:flex;gap:2px;align-items:flex-end;height:28px">${ms.map(s=>`<div style="flex:1;background:#00ff9d;border-radius:2px 2px 0 0;height:${(s.distance/maxD)*100}%;opacity:.6;min-height:3px" title="${s.distance}km"></div>`).join('')}</div>`:`<div style="font-size:11px;color:#2a3545;text-align:center;padding-top:2px">Tidak ada sesi</div>`;
      return `<div class="card" style="opacity:${m.count===0?.4:1};margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
          <div><div class="lbl">${MONTHS_ID[i]} ${year}</div>
            <div class="big" style="font-size:26px">${m.dist||0}<span style="font-size:13px;color:#556"> km</span></div></div>
          <div style="text-align:right">
            ${m.count>0?`<div style="font-size:12px;font-weight:700;color:${tr.color}">${tr.text}</div>`:''}
            <div style="font-size:11px;color:#445">${m.count} sesi</div>
            ${m.pace>0?`<div style="font-size:11px;color:#ffb347">${fmtPace(m.pace)} /km</div>`:''}
          </div>
        </div>${bars}
      </div>`;
    }).join('');

    // pace trend
    const paceData = monthly.filter(m=>m.pace>0);
    const paceEl = el("chart-pace");
    if(paceData.length>1){
      paceEl.classList.remove("hidden");
      paceEl.innerHTML=`<div class="lbl" style="margin-bottom:10px">Tren Pace Bulanan</div>`;
      const chartDiv=document.createElement("div");
      paceEl.appendChild(chartDiv);
      setTimeout(()=>svgLineChart(chartDiv, paceData, "name", "pace", "#ffb347"),0);
    } else { paceEl.classList.add("hidden"); }
  }

  // ── PERBANDINGAN ──
  if(tab==="perbandingan"){
    toggle("empty-cmp", !sessions.length);
    if(!sessions.length) el("empty-cmp").innerHTML=`<div style="font-size:40px;margin-bottom:10px">🏃</div><div style="font-family:'Barlow Condensed';font-weight:800;font-size:20px">Belum ada sesi di ${year}</div>`;

    // chips
    el("chips-a").innerHTML = MONTHS_SHORT.map((m,i)=>
      `<button class="chip${cmpA===i?" a":""}" onclick="cmpA=${i};render()">${m}</button>`
    ).join('');
    el("chips-b").innerHTML = MONTHS_SHORT.map((m,i)=>
      `<button class="chip${cmpB===i?" b":""}" onclick="cmpB=${i};render()">${m}</button>`
    ).join('');

    const mA=monthly[cmpA], mB=monthly[cmpB];

    el("cmp-cards").innerHTML=`
      <div class="cmp-card" style="border:1px solid #00ff9d33">
        <div style="font-size:9px;font-weight:700;letter-spacing:3px;color:#00ff9d;margin-bottom:2px">BULAN A</div>
        <div style="font-family:'Barlow Condensed';font-weight:800;font-size:13px;color:#889;margin-bottom:4px">${mA.name} ${year}</div>
        <div style="font-family:'Barlow Condensed';font-weight:800;font-size:30px;color:#00ff9d;line-height:1">${mA.dist}<span style="font-size:13px;color:#556"> km</span></div>
        <div style="font-size:11px;color:#445;margin-top:4px">${mA.count} sesi</div>
        ${mA.pace>0?`<div style="font-size:11px;color:#ffb347;margin-top:2px">${fmtPace(mA.pace)} /km</div>`:''}
      </div>
      <div style="text-align:center;font-family:'Barlow Condensed';font-weight:800;font-size:16px;color:#2a3545">VS</div>
      <div class="cmp-card" style="border:1px solid #7eb8f733">

      const win=hi?(a>b?"A":a<b?"B":"="):(a&&b?(a<b?"A":a>b?"B":"="):"=");
      const d=a&&b?Math.abs(parseFloat(pct(a,b))):null;
      const pctW=a&&b?Math.min((a/(a+b))*100,100):50;
      return `<div class="conclude-row">
        <div style="width:48px;font-size:11px;font-weight:700;letter-spacing:1px;color:#556">${k}</div>

        <div style="width:40px;font-size:10px;color:#445;text-align:right;font-weight:700">

        </div>
      </div>`;
    }).join('');
  }

  // ── HARIAN ──
  if(tab==="harian"){
    toggle("empty-harian", !sessions.length);
    if(!sessions.length) el("empty-harian").innerHTML=`<div style="font-size:40px;margin-bottom:10px">🏃</div><div style="font-family:'Barlow Condensed';font-weight:800;font-size:20px">Belum ada sesi di ${year}</div>`;
    renderHarian();
  }

  // ── TARGET ──
  if(tab==="target"){
    toggle("empty-target", !sessions.length);
    if(!sessions.length) el("empty-target").innerHTML=`<div style="font-size:40px;margin-bottom:10px">🏃</div><div style="font-family:'Barlow Condensed';font-weight:800;font-size:20px">Belum ada sesi di ${year}</div>`;
    renderTarget();
  }

  // ── LOG ──
  if(tab==="log"){
    el("log-count").textContent=`${sessions.length} SESI — ${year}`;
    toggle("empty-log", !sessions.length);
    if(!sessions.length) el("empty-log").innerHTML=`<div style="font-size:40px;margin-bottom:10px">🏃</div><div style="font-family:'Barlow Condensed';font-weight:800;font-size:20px">Belum ada sesi di ${year}</div><div style="font-size:13px;color:#445;line-height:1.6;margin-top:6px">Tekan <span style="color:#00ff9d;font-weight:700">+</span> di atas<br/>untuk mulai catat larimu</div>`;

    el("log-list").innerHTML=[...sessions].reverse().map(s=>`
      <div class="log-item" style="margin-bottom:8px">
        <div style="flex:1;min-width:0">
          <div class="lbl">${fmtDate(s.date)} · ${DAYS_ID[new Date(s.date).getDay()]}</div>
          <div style="display:flex;gap:12px;align-items:baseline;margin-top:2px">
            <span style="font-family:'Barlow Condensed';font-weight:800;font-size:20px;color:#00ff9d">${s.distance}<span style="font-size:11px;color:#556"> km</span></span>
            <span style="font-family:'Barlow Condensed';font-weight:700;font-size:14px;color:#ffb347">${fmtPace(s.pace)}<span style="font-size:10px;color:#445">/km</span></span>
            <span style="font-size:11px;color:#445">${s.duration}min</span>
          </div>
        </div>
        <button class="edit-btn" onclick="startEdit('${s.id}')">EDIT</button>
        ${deleteConfirm===s.id
          ?`<div style="display:flex;gap:4px">
              <button onclick="deleteSession('${s.id}')" style="background:#ff4d6d;color:#fff;border:none;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;font-weight:700">Hapus</button>
              <button onclick="deleteConfirm=null;render()" style="background:#1a2535;color:#889;border:none;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer">Batal</button>
            </div>`
          :`<button class="del-btn" onclick="deleteConfirm='${s.id}';render()">×</button>`
        }
      </div>`).join('');
  }
}

/* ─── HARIAN ─── */
function renderHarian(){
  const sessions = getSessions();
  const dateA = el("harian-a")?.value;
  const dateB = el("harian-b")?.value;

  const getDaySessions = (date) => date ? sessions.filter(s=>s.date===date) : [];
  const aggDay = (ss) => ({
    count: ss.length,
    dist: +ss.reduce((a,b)=>a+b.distance,0).toFixed(2),
    pace: ss.length ? +(ss.reduce((a,b)=>a+b.pace,0)/ss.length).toFixed(2) : 0,
    duration: ss.reduce((a,b)=>a+b.duration,0),
  });

  const ssA = getDaySessions(dateA);
  const ssB = getDaySessions(dateB);
  const dA = aggDay(ssA);
  const dB = aggDay(ssB);

  const labelA = dateA ? fmtDate(dateA) : "—";
  const labelB = dateB ? fmtDate(dateB) : "—";

  el("harian-cards").innerHTML=`
    <div class="cmp-card" style="border:1px solid #00ff9d33">
      <div style="font-size:9px;font-weight:700;letter-spacing:3px;color:#00ff9d;margin-bottom:2px">HARI A</div>
      <div style="font-family:'Barlow Condensed';font-weight:800;font-size:12px;color:#889;margin-bottom:4px">${labelA}</div>
      <div style="font-family:'Barlow Condensed';font-weight:800;font-size:28px;color:#00ff9d;line-height:1">${dA.dist}<span style="font-size:12px;color:#556"> km</span></div>
      <div style="font-size:11px;color:#445;margin-top:4px">${dA.count} sesi</div>
      ${dA.pace>0?`<div style="font-size:11px;color:#ffb347;margin-top:2px">${fmtPace(dA.pace)} /km</div>`:''}
      ${dA.duration>0?`<div style="font-size:11px;color:#556;margin-top:2px">${dA.duration} menit</div>`:''}
    </div>
    <div style="text-align:center;font-family:'Barlow Condensed';font-weight:800;font-size:16px;color:#2a3545">VS</div>
    <div class="cmp-card" style="border:1px solid #7eb8f733">
      <div style="font-size:9px;font-weight:700;letter-spacing:3px;color:#7eb8f7;margin-bottom:2px">HARI B</div>
      <div style="font-family:'Barlow Condensed';font-weight:800;font-size:12px;color:#889;margin-bottom:4px">${labelB}</div>
      <div style="font-family:'Barlow Condensed';font-weight:800;font-size:28px;color:#7eb8f7;line-height:1">${dB.dist}<span style="font-size:12px;color:#556"> km</span></div>
      <div style="font-size:11px;color:#445;margin-top:4px">${dB.count} sesi</div>
      ${dB.pace>0?`<div style="font-size:11px;color:#ffb347;margin-top:2px">${fmtPace(dB.pace)} /km</div>`:''}
      ${dB.duration>0?`<div style="font-size:11px;color:#556;margin-top:2px">${dB.duration} menit</div>`:''}
    </div>`;

  const concludeEl = el("harian-conclude");
  if(dateA && dateB && (dA.count>0 || dB.count>0)){
    concludeEl.classList.remove("hidden");
    const rows=[
      {k:"Jarak",a:dA.dist,b:dB.dist,u:" km",hi:true,f:null},
      {k:"Durasi",a:dA.duration,b:dB.duration,u:"m",hi:true,f:null},
      {k:"Pace",a:dA.pace,b:dB.pace,u:"",hi:false,f:fmtPace},
    ];
    concludeEl.innerHTML=`<div class="lbl" style="margin-bottom:10px">Kesimpulan Harian</div>`+rows.map(({k,a,b,u,hi,f})=>{
      const win=hi?(a>b?"A":a<b?"B":"="):(a&&b?(a<b?"A":a>b?"B":"="):"=");
      const d=a&&b?Math.abs(parseFloat(pct(a,b))):null;
      const pctW=a&&b?Math.min((a/(a+b))*100,100):50;
      return `<div class="conclude-row">
        <div style="width:48px;font-size:11px;font-weight:700;letter-spacing:1px;color:#556">${k}</div>
        <div style="font-family:'Barlow Condensed';font-weight:800;font-size:17px;color:${win==="A"?"#00ff9d":"#889"};min-width:48px">${f?f(a):(a||0)+u}</div>
        <div style="flex:1;height:3px;background:#1a2535;border-radius:2px;overflow:hidden;position:relative">
          ${a&&b?`<div class="bar-fill" style="width:${pctW}%;background:#00ff9d"></div>`:''}
        </div>
        <div style="font-family:'Barlow Condensed';font-weight:800;font-size:17px;color:${win==="B"?"#7eb8f7":"#889"};min-width:48px;text-align:right">${f?f(b):(b||0)+u}</div>
        <div style="width:40px;font-size:10px;color:#445;text-align:right;font-weight:700">
          ${win!=="="?`<span style="color:${win==="A"?"#00ff9d":"#7eb8f7"}">${win}</span>${d!==null?`<span style="display:block;font-size:9px">${d.toFixed(1)}%</span>`:''}`:"—"}
        </div>
      </div>`;
    }).join('');
  } else {
    concludeEl.classList.add("hidden");
  }
}

/* ─── TARGET & INTERVAL ─── */
function setTargetDist(d){
  targetDist = d;
  renderTargetPresets();
  renderTarget();
}

function toggleCustomDist(){
  const row = el("custom-dist-row");
  if(row.classList.contains("hidden")) row.classList.remove("hidden");
  else row.classList.add("hidden");
}

function applyCustomDist(){
  const v = parseFloat(el("custom-dist-val").value);
  if(!v||v<=0) return;
  targetDist = +v.toFixed(2);
  el("custom-dist-row").classList.add("hidden");
  renderTargetPresets();
  renderTarget();
}

function renderTargetPresets(){
  const presets = [
    {label:"5 km", dist:5},
    {label:"10 km", dist:10},
    {label:"Half (21K)", dist:21.0975},
    {label:"Full (42K)", dist:42.195},
  ];
  const isCustom = targetDist && !presets.some(p=>Math.abs(p.dist-targetDist)<0.01);
  el("target-presets").innerHTML = presets.map(p=>{
    const active = targetDist && Math.abs(p.dist-targetDist)<0.01;
    return `<button class="chip${active?" a":""}" onclick="setTargetDist(${p.dist})">${p.label}</button>`;
  }).join('') + `<button class="chip${isCustom?" a":""}" onclick="toggleCustomDist()">Atur Sendiri${isCustom&&targetDist?` (${targetDist}km)`:''}</button>`;
  el("target-dist-label").textContent = targetDist ? `${targetDist} km` : "—";
}

function toggleIntervalMode(){
  intervalMode = el("interval-toggle").checked;
  const cfg = el("interval-config");
  if(intervalMode) cfg.classList.remove("hidden");
  else cfg.classList.add("hidden");
  el("interval-result").classList.add("hidden");
}

function calcInterval(){
  const dist = parseFloat(el("interval-dist").value)||1;
  const reps = parseInt(el("interval-reps").value)||8;
  const pace = parseFloat(el("interval-pace").value);
  const resEl = el("interval-result");
  resEl.classList.remove("hidden");

  const totalDist = +(dist * reps).toFixed(2);
  const timePerRep = pace ? Math.round(dist * pace) : null;
  const totalTime = timePerRep ? timePerRep * reps : null;
  const fmt = mins => `${Math.floor(mins/60)?Math.floor(mins/60)+'j ':'' }${mins%60}m`;

  resEl.innerHTML = `
    <div style="background:#0a1018;border-radius:8px;padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div><div class="lbl">Total Jarak</div><div style="font-family:'Barlow Condensed';font-weight:800;font-size:22px;color:#ffb347">${totalDist}<span style="font-size:11px;color:#556"> km</span></div></div>
      <div><div class="lbl">Repetisi</div><div style="font-family:'Barlow Condensed';font-weight:800;font-size:22px;color:#ffb347">${reps}<span style="font-size:11px;color:#556">x</span></div></div>
      <div><div class="lbl">Per Rep</div><div style="font-family:'Barlow Condensed';font-weight:800;font-size:22px;color:#ffb347">${dist}<span style="font-size:11px;color:#556"> km</span></div></div>
      ${timePerRep?`<div><div class="lbl">Waktu/Rep</div><div style="font-family:'Barlow Condensed';font-weight:800;font-size:22px;color:#ffb347">${fmt(timePerRep)}</div></div>`:''}
      ${totalTime?`<div style="grid-column:1/-1"><div class="lbl">Total Waktu</div><div style="font-family:'Barlow Condensed';font-weight:800;font-size:22px;color:#00ff9d">${fmt(totalTime)}</div></div>`:''}
    </div>`;
}

function renderTarget(){
  renderTargetPresets();
  if(!targetDist) return;

  const sessions = getSessions();
  // find best session for this distance (closest >= targetDist or closest overall)
  const candidates = sessions.filter(s=>s.distance>=targetDist*0.95);
  const exact = sessions.filter(s=>Math.abs(s.distance-targetDist)<=0.5).sort((a,b)=>a.pace-b.pace);

  const progCard = el("target-progress-card");
  const sessCard = el("target-sessions-card");

  // Total km this year vs target
  const totalKm = +sessions.reduce((a,b)=>a+b.distance,0).toFixed(1);
  const pctDone = Math.min((totalKm/targetDist)*100,100);
  const lapsCompleted = Math.floor(totalKm/targetDist);

  progCard.classList.remove("hidden");
  progCard.innerHTML=`
    <div class="lbl" style="margin-bottom:10px">Progress vs ${targetDist} km</div>
    <div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <span style="font-family:'Barlow Condensed';font-weight:800;font-size:28px;color:#ff6b9d">${totalKm}<span style="font-size:12px;color:#556"> km</span></span>
      <span style="font-family:'Barlow Condensed';font-weight:700;font-size:13px;color:#445;align-self:flex-end;padding-bottom:4px">dari ${targetDist} km</span>
    </div>
    <div style="background:#1a2535;border-radius:4px;height:8px;overflow:hidden;margin-bottom:8px">
      <div style="height:100%;border-radius:4px;background:linear-gradient(90deg,#ff6b9d,#ffb347);width:${pctDone}%;transition:width .4s"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:#445">
      <span>${pctDone.toFixed(1)}% tercapai</span>
      <span>${lapsCompleted > 0 ? `${lapsCompleted}x selesai` : `Kurang ${(targetDist-totalKm).toFixed(1)} km`}</span>
    </div>
    ${exact.length>0?`
    <div style="margin-top:10px;border-top:1px solid #1a2535;padding-top:10px">
      <div class="lbl" style="margin-bottom:6px">Pace Terbaik untuk ~${targetDist}km</div>
      <div style="font-family:'Barlow Condensed';font-weight:800;font-size:22px;color:#00ff9d">${fmtPace(exact[0].pace)} <span style="font-size:12px;color:#556">/km</span></div>
      <div style="font-size:11px;color:#445">${fmtDate(exact[0].date)} · ${exact[0].distance} km</div>
    </div>`:''}`;

  // sessions near target
  if(exact.length>0){
    sessCard.classList.remove("hidden");
    sessCard.innerHTML=`<div class="lbl" style="margin-bottom:10px">Sesi ~${targetDist} km (±0.5km)</div>`+
      exact.slice(0,5).map((s,i)=>`
        <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;${i>0?"border-top:1px solid #1a2535":""}">
          <div>
            <div style="font-family:'Barlow Condensed';font-weight:800;font-size:16px;color:${i===0?"#00ff9d":"#e8f0fe"}">${fmtPace(s.pace)} <span style="font-size:10px;color:#445">/km</span></div>
            <div style="font-size:10px;color:#445">${fmtDate(s.date)}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:13px;font-weight:700;color:#ff6b9d">${s.distance} km</div>
            <div style="font-size:10px;color:#445">${s.duration} menit</div>
          </div>
          ${i===0?'<div style="font-size:18px;margin-left:6px">🏆</div>':''}
        </div>`).join('');
  } else { sessCard.classList.add("hidden"); }
}

/* ─── ACTIONS ─── */
function switchTab(t){ tab=t; render(); }
function switchYear(y){ year=y; if(!allData[y]){allData[y]=loadYear(y);} tab="dashboard"; showForm=false; render(); }

function toggleForm(){
  if(showForm){ showForm=false; editId=null; }
  else { showForm=true; editId=null; el("f-date").value=""; el("f-dist").value=""; el("f-pace").value=""; }
  render();
  el("btn-add").style.background = showForm?"#ff4d6d":"#00ff9d";
  el("btn-add").textContent = showForm?"×":"+";
}

function saveSession(){
  const date=el("f-date").value, distance=el("f-dist").value, pace=el("f-pace").value;
  hide("form-err");
  if(!date||!distance||!pace){ el("form-err").textContent="Semua field wajib diisi"; show("form-err"); return; }
  const dist=parseFloat(distance), p=parseFloat(pace);
  if(isNaN(dist)||dist<=0||isNaN(p)||p<=0){ el("form-err").textContent="Jarak dan pace harus angka positif"; show("form-err"); return; }
  const d=new Date(date);
  const entry={id:editId||`s-${Date.now()}`,date,month:d.getMonth(),distance:+dist.toFixed(2),pace:+p.toFixed(2),duration:Math.round(dist*p)};
  if(!allData[year]) allData[year]=[];
  allData[year]=allData[year].filter(s=>s.id!==entry.id);
  allData[year].push(entry);
  saveYear(year, allData[year]);
  showForm=false; editId=null;
  el("btn-add").style.background="#00ff9d"; el("btn-add").textContent="+";
  render();
}

function startEdit(id){
  const s=getSessions().find(s=>s.id===id);
  if(!s)return;
  editId=id; showForm=true;
  tab="dashboard";
  el("f-date").value=s.date; el("f-dist").value=String(s.distance); el("f-pace").value=String(s.pace);
  el("btn-add").style.background="#ff4d6d"; el("btn-add").textContent="×";
  render();
}

function deleteSession(id){
  allData[year]=(allData[year]||[]).filter(s=>s.id!==id);
  saveYear(year,allData[year]);
  deleteConfirm=null;
  render();
}

function addYear(){
  const y=parseInt(el("new-year-inp").value);
  if(!y||y<1900||y>2200){el("new-year-inp").value="";return;}
  if(!yearList.includes(y)){ yearList=[...yearList,y].sort((a,b)=>a-b); saveYearList(yearList); allData[y]=loadYear(y); }
  el("modal-year").classList.add("hidden");
  el("new-year-inp").value="";
  switchYear(y);
}

/* ─── EVENT LISTENERS ─── */
el("btn-add").addEventListener("click", toggleForm);
el("btn-cancel").addEventListener("click", ()=>{ showForm=false; editId=null; el("btn-add").style.background="#00ff9d"; el("btn-add").textContent="+"; render(); });
el("btn-save").addEventListener("click", saveSession);
el("btn-export").addEventListener("click", exportExcel);
el("modal-cancel").addEventListener("click", ()=>{ el("modal-year").classList.add("hidden"); el("new-year-inp").value=""; });
el("modal-add").addEventListener("click", addYear);
el("new-year-inp").addEventListener("keydown", e=>{ if(e.key==="Enter") addYear(); });
el("modal-year").addEventListener("click", e=>{ if(e.target===el("modal-year")) el("modal-year").classList.add("hidden"); });
document.querySelectorAll(".nav-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>switchTab(btn.dataset.tab));
});

/* ─── INIT ─── */
render();
renderTargetPresets();

  // Service Worker untuk offline support
  if('serviceWorker' in navigator){
    const swCode = `
const CACHE = 'run-tracker-v1';
const ASSETS = ['/'];

self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)).catch(()=>{}));
  self.skipWaiting();
});

self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
  ));
  self.clients.claim();
});

self.addEventListener('fetch', e => {
  e.respondWith(
    fetch(e.request).catch(() => caches.match(e.request))
  );
});
    `;
    const swBlob = new Blob([swCode], {type:'application/javascript'});
    const swUrl = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl).catch(()=>{});
  }

  // Tombol Install (A2HS)
  let deferredPrompt = null;
